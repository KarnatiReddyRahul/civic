stages:
  - lint
  - static-analysis
  - security
  - test

default:
  image: python:3.11-slim
  before_script:
    - python3 -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install ruff mypy pytest pytest-cov bandit pip-audit httpx

ruff-lint:
  stage: lint
  script:
    - ruff check .

ruff-format:
  stage: lint
  script:
    - ruff format --check .

mypy-typecheck:
  stage: static-analysis
  script:
    - mypy backend --ignore-missing-imports

bandit-scan:
  stage: security
  script:
    - bandit -r backend/ -x backend/tests

pip-audit-check:
  stage: security
  script:
    - pip-audit

pytest-suite:
  stage: test
  script:
    - pytest
  coverage: '/TOTAL.*\s+(\d+)\%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
