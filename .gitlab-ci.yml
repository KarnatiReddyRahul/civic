stages:
  - format
  - lint
  - type_check
  - security
  - test
  - coverage

default:
  image: python:3.11-slim

  before_script:
    - python -m venv venv
    - . venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install ruff mypy pytest pytest-cov bandit pip-audit httpx

ruff-format:
  stage: format
  script:
    - ruff format --check .

ruff-lint:
  stage: lint
  script:
    - ruff check .

mypy-typecheck:
  stage: type_check
  script:
    - mypy backend --ignore-missing-imports

bandit-scan:
  stage: security
  script:
    - bandit -r backend/ -x backend/tests

gitleaks-scan:
  stage: security
  script:
    - apt-get update && apt-get install -y wget && wget -O /tmp/gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz && tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin && gitleaks detect --source . -v

pip-audit-check:
  stage: security
  script:
    - pip-audit

pytest-suite:
  stage: test
  script:
    - pytest

coverage-report:
  stage: coverage
  script:
    - pytest --cov=backend --cov-report=xml --cov-report=term
  coverage: '/TOTAL.*\s+(\d+)\%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
